# Local development only — do NOT use in production.
# Credentials below are intentionally hardcoded dev defaults.
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: daynest
      POSTGRES_PASSWORD: daynest
      POSTGRES_DB: daynest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daynest -d daynest"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
