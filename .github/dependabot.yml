version: 2
updates:
  # Monitor npm dependencies for the main frontend app
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    versioning-strategy: "increase"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      bootstrap:
        patterns:
          - "bootstrap"
          - "bootstrap-icons"
          - "react-bootstrap"
      vite:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
      testing:
        patterns:
          - "@testing-library/*"
          - "@vitest/*"
          - "vitest"
      oxc:
        patterns:
          - "oxlint"
          - "oxfmt"
      i18n:
        patterns:
          - "@inlang/*"
      schedule-x:
        patterns:
          - "@schedule-x/*"

  # Monitor npm dependencies for the Lovelace card
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    versioning-strategy: "increase"
    groups:
      schedule-x:
        patterns:
          - "@schedule-x/*"
      rollup:
        patterns:
          - "rollup"
          - "@rollup/*"
          - "rollup-plugin-*"

  # Monitor Android Gradle dependencies and wrapper versions
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(android)"
      include: "scope"
    labels:
      - "dependencies"
      - "android"

  # Monitor uv-managed Python dependencies for the backend API
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(backend)"
      include: "scope"
    labels:
      - "dependencies"
      - "backend"
      - "python"
    versioning-strategy: "increase"
    groups:
      python-quality:
        patterns:
          - "ruff"
          - "ty"

  # Monitor uv-managed Python dependencies for the Home Assistant custom component
  - package-ecosystem: "uv"
    directory: "/custom_components"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(ha)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: "increase"

  # Monitor uv-managed Python dependencies for the python-daynest library
  - package-ecosystem: "uv"
    directory: "/python-daynest"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(lib)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: "increase"

  # Monitor GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      codeql:
        patterns:
          - "github/codeql-action/*"

  # Monitor Docker images
  - package-ecosystem: "docker"
    directories:
      - "/backend"
      - "/frontend"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"

  # Monitor Docker Compose files
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 20
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps(compose)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
