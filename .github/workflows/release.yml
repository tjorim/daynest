name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate release tag format
        run: |
          set -euo pipefail
          # App version is CalVer YYYY.MM.MICRO (see issue #673) but that's
          # still a strict 3-part X.Y.Z, so the tag pattern itself is unchanged.
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is not a strict X.Y.Z release tag (expected format: v2026.7.1)"
            exit 1
          fi
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Check VERSION file
        run: |
          set -euo pipefail
          FILE_VERSION=$(<VERSION)
          if [[ "${FILE_VERSION}" != "${VERSION}" ]]; then
            echo "::error::VERSION file '${FILE_VERSION}' does not match tag '${VERSION}'"
            exit 1
          fi
          echo "✓ VERSION: ${FILE_VERSION}"

      - name: Read python-daynest/pyproject.toml version
        # python-daynest keeps its own independent SemVer version — it is
        # NOT expected to match the app's CalVer tag (see issue #673). This
        # just captures it for the requirements-pin cross-check below; the
        # lib job separately skips publishing if this version is already
        # on PyPI.
        run: |
          set -euo pipefail
          LIB_VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' python-daynest/pyproject.toml)
          echo "LIB_VERSION=${LIB_VERSION}" >> "$GITHUB_ENV"
          echo "✓ python-daynest/pyproject.toml: ${LIB_VERSION}"

      - name: Check custom_components/daynest/manifest.json version
        run: |
          set -euo pipefail
          FILE_VERSION=$(python3 -c "import json; d=json.load(open('custom_components/daynest/manifest.json')); print(d['version'])")
          if [[ "${FILE_VERSION}" != "${VERSION}" ]]; then
            echo "::error::custom_components/daynest/manifest.json version '${FILE_VERSION}' does not match tag '${VERSION}'"
            exit 1
          fi
          echo "✓ custom_components/daynest/manifest.json: ${FILE_VERSION}"

      - name: Check manifest.json python-daynest requirements pin
        run: |
          set -euo pipefail
          FILE_VERSION=$(python3 -c "
          import json, re, sys
          d = json.load(open('custom_components/daynest/manifest.json'))
          reqs = d.get('requirements', [])
          m = next((re.match(r'python-daynest==(.+)', r) for r in reqs), None)
          if not m:
              print('::error::manifest.json requirements list has no python-daynest== pin')
              sys.exit(1)
          print(m.group(1))
          ")
          # Checked against python-daynest's own version, not the app tag —
          # the two are independently versioned (see issue #673).
          if [[ "${FILE_VERSION}" != "${LIB_VERSION}" ]]; then
            echo "::error::manifest.json python-daynest requirement pin '${FILE_VERSION}' does not match python-daynest/pyproject.toml's version '${LIB_VERSION}'"
            exit 1
          fi
          echo "✓ manifest.json requirements pin: python-daynest==${FILE_VERSION}"

      # android/app/build.gradle.kts versionName/versionCode are no longer
      # hand-maintained literals — both are computed from the root VERSION
      # file at build time (see versionCodeFor()), which is checked above,
      # so there's nothing left here that could independently drift.

      - name: Check frontend/package.json
        run: |
          set -euo pipefail
          FILE_VERSION=$(python3 -c "import json; d=json.load(open('frontend/package.json')); print(d['version'])")
          if [[ "${FILE_VERSION}" != "${VERSION}" ]]; then
            echo "::error::frontend/package.json version '${FILE_VERSION}' does not match tag '${VERSION}'"
            exit 1
          fi
          echo "✓ frontend/package.json: ${FILE_VERSION}"

      - name: Check dashboard/package.json
        run: |
          set -euo pipefail
          FILE_VERSION=$(python3 -c "import json; d=json.load(open('dashboard/package.json')); print(d['version'])")
          if [[ "${FILE_VERSION}" != "${VERSION}" ]]; then
            echo "::error::dashboard/package.json version '${FILE_VERSION}' does not match tag '${VERSION}'"
            exit 1
          fi
          echo "✓ dashboard/package.json: ${FILE_VERSION}"

      - name: Check CHANGELOG.md entry
        run: |
          set -euo pipefail
          ESCAPED_VERSION="$(printf '%s' "${VERSION}" | sed 's/\./\\./g')"
          if ! grep -qE "^## \[${ESCAPED_VERSION}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${VERSION}] - YYYY-MM-DD' section. Add a dated changelog entry before tagging."
            exit 1
          fi
          echo "✓ CHANGELOG.md: entry for [${VERSION}] found"

  lib:
    name: Publish python-daynest to PyPI
    needs: [preflight]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: python-daynest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.8.22'

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Type-check
        run: uv run pyright src

      - name: Test
        run: uv run pytest -q

      - name: Build
        run: uv build

      - name: Check if this version is already on PyPI
        # python-daynest releases independently of the app (see issue #673),
        # so most app tags won't have bumped its version. Skip rather than
        # fail — `uv publish` would otherwise error on a duplicate version.
        id: check-published
        run: |
          set -euo pipefail
          LIB_VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' pyproject.toml)
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/python-daynest/${LIB_VERSION}/json")
          if [[ "${HTTP_STATUS}" == "200" ]]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "python-daynest ${LIB_VERSION} is already on PyPI; skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.check-published.outputs.already_published == 'false'
        run: uv publish --trusted-publishing always

  hacs:
    name: Build HACS package
    needs: [lib]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard card
        working-directory: dashboard
        run: npm run build

      - name: Create HACS release archive
        working-directory: custom_components/daynest
        run: zip -r ../../daynest.zip .

      - name: Upload HACS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: daynest-hacs
          path: daynest.zip
          if-no-files-found: error

  android:
    name: Build Android release APK
    needs: [preflight]
    runs-on: ubuntu-latest
    outputs:
      apk_available: ${{ steps.keystore.outputs.signing_available || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Write local.properties
        id: local-properties
        working-directory: android
        env:
          ANDROID_API_BASE_URL: ${{ secrets.ANDROID_API_BASE_URL }}
        run: |
          if [[ -n "${ANDROID_API_BASE_URL}" ]]; then
            echo "release_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::ANDROID_API_BASE_URL is not set. Release APK will be skipped."
            echo "release_available=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "apiBaseUrlRelease=${ANDROID_API_BASE_URL:-https://release.placeholder.invalid/}"
          } >> local.properties

      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [[ -n "${KEYSTORE_BASE64}" ]]; then
            KEYSTORE_PATH="${RUNNER_TEMP}/release.keystore"
            echo "${KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
            echo "keystore_path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"
            echo "signing_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::KEYSTORE_BASE64 is not set. Release APK will be skipped."
            echo "signing_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble release APK
        if: >
          steps.local-properties.outputs.release_available == 'true' &&
          steps.keystore.outputs.signing_available == 'true'
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          ANDROID_API_BASE_URL: ${{ secrets.ANDROID_API_BASE_URL }}
          ANDROID_CERTIFICATE_PIN_HOST: ${{ secrets.ANDROID_CERTIFICATE_PIN_HOST }}
          ANDROID_CERTIFICATE_PINS: ${{ secrets.ANDROID_CERTIFICATE_PINS }}
        run: ./gradlew :app:assembleRelease

      - name: Upload Android APK
        if: >
          steps.local-properties.outputs.release_available == 'true' &&
          steps.keystore.outputs.signing_available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: daynest-android-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [hacs, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download HACS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: daynest-hacs

      - name: Download Android APK
        if: needs.android.outputs.apk_available == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: daynest-android-release
          path: android-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: false
          files: |
            daynest.zip
            android-apk/*.apk
