name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  lib:
    name: Publish python-daynest to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: python-daynest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.8.22'

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Type-check
        run: uv run pyright src

      - name: Test
        run: uv run pytest -q

      - name: Set version from tag
        run: sed -i "s/^version = .*/version = \"${GITHUB_REF_NAME#v}\"/" pyproject.toml

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

  hacs:
    name: Build HACS package
    needs: lib
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard card
        working-directory: dashboard
        run: npm run build

      - name: Stamp version into manifest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" \
            '.version = $v | .requirements = ["python-daynest==\($v)"]' \
            custom_components/daynest/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/daynest/manifest.json

      - name: Create HACS release archive
        working-directory: custom_components/daynest
        run: zip -r ../../daynest.zip .

      - name: Upload HACS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: daynest-hacs
          path: daynest.zip
          if-no-files-found: error

  android:
    name: Build Android release APK
    runs-on: ubuntu-latest
    outputs:
      apk_available: ${{ steps.keystore.outputs.signing_available || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Write local.properties
        id: local-properties
        working-directory: android
        env:
          API_BASE_URL_RELEASE: ${{ secrets.API_BASE_URL_RELEASE }}
          API_BASE_URL_STAGING: ${{ secrets.API_BASE_URL_STAGING }}
        run: |
          if [[ -n "${API_BASE_URL_RELEASE}" ]]; then
            echo "release_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::API_BASE_URL_RELEASE is not set. Release APK will be skipped."
            echo "release_available=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "apiBaseUrlStaging=${API_BASE_URL_STAGING:-https://staging.placeholder.invalid/}"
            echo "apiBaseUrlRelease=${API_BASE_URL_RELEASE:-https://release.placeholder.invalid/}"
          } >> local.properties

      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [[ -n "${KEYSTORE_BASE64}" ]]; then
            KEYSTORE_PATH="${RUNNER_TEMP}/release.keystore"
            echo "${KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
            echo "keystore_path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"
            echo "signing_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::KEYSTORE_BASE64 is not set. Release APK will be skipped."
            echo "signing_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble release APK
        if: >
          steps.local-properties.outputs.release_available == 'true' &&
          steps.keystore.outputs.signing_available == 'true'
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Upload Android APK
        if: >
          steps.local-properties.outputs.release_available == 'true' &&
          steps.keystore.outputs.signing_available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: daynest-android-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [hacs, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download HACS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: daynest-hacs

      - name: Download Android APK
        if: needs.android.outputs.apk_available == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: daynest-android-release
          path: android-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: false
          files: |
            daynest.zip
            android-apk/*.apk
