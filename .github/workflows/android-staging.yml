name: Android Staging APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-staging.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-staging.yml'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Staging API base URL (defaults to the API_BASE_URL_STAGING secret, or a placeholder when unset)'
        required: false
        type: string

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  staging-apk:
    name: Assemble Staging APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Write local.properties from secrets
        working-directory: android
        env:
          API_BASE_URL_STAGING: ${{ inputs.api_base_url || secrets.API_BASE_URL_STAGING }}
        run: |
          {
            # .invalid TLD is an RFC 2606 reserved domain intentionally unusable in production
            echo "apiBaseUrlStaging=${API_BASE_URL_STAGING:-https://staging.placeholder.invalid/}"
          } >> local.properties

      - name: Assemble staging APK
        working-directory: android
        run: ./gradlew :app:assembleStaging

      - name: Upload staging APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: daynest-staging-debug
          path: android/app/build/outputs/apk/staging/*.apk
          if-no-files-found: error
