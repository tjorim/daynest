name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Git tag to attach to the GitHub Release (e.g. v1.0.0). Leave empty to skip release creation.'
        required: false
        default: ''
        type: string

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: write # required for the Create GitHub Release step

jobs:
  android:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Write local.properties from secrets
        id: local-properties
        working-directory: android
        env:
          API_BASE_URL_RELEASE: ${{ secrets.API_BASE_URL_RELEASE }}
        run: |
          if [[ -n "${API_BASE_URL_RELEASE}" ]]; then
            echo "release_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::API_BASE_URL_RELEASE secret is not set. Release APK will be skipped."
            echo "release_available=false" >> "$GITHUB_OUTPUT"
          fi
          {
            # .invalid TLD is an RFC 2606 reserved domain intentionally unusable in production
            echo "apiBaseUrlRelease=${API_BASE_URL_RELEASE:-https://release.placeholder.invalid/}"
          } >> local.properties

      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [[ -n "${KEYSTORE_BASE64}" ]]; then
            KEYSTORE_PATH="${RUNNER_TEMP}/release.keystore"
            echo "${KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
            echo "keystore_path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"
            echo "signing_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::KEYSTORE_BASE64 secret is not set. Release APK will be skipped."
            echo "signing_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble release APK
        if: >
          steps.local-properties.outputs.release_available == 'true' &&
          steps.keystore.outputs.signing_available == 'true'
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Upload release APK
        if: >
          steps.local-properties.outputs.release_available == 'true' &&
          steps.keystore.outputs.signing_available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: >
          inputs.release_tag != '' &&
          steps.local-properties.outputs.release_available == 'true' &&
          steps.keystore.outputs.signing_available == 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          draft: true
          files: android/app/build/outputs/apk/release/*.apk
