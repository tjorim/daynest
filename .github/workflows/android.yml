name: Android CI

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Write local.properties from secrets
        working-directory: android
        env:
          API_BASE_URL_STAGING: ${{ secrets.API_BASE_URL_STAGING }}
          API_BASE_URL_RELEASE: ${{ secrets.API_BASE_URL_RELEASE }}
        run: |
          if [[ -z "${API_BASE_URL_STAGING}" ]]; then
            echo "::error::Secret API_BASE_URL_STAGING is not set."
            exit 1
          fi
          if [[ -z "${API_BASE_URL_RELEASE}" ]]; then
            echo "::error::Secret API_BASE_URL_RELEASE is not set."
            exit 1
          fi
          {
            echo "apiBaseUrlStaging=${API_BASE_URL_STAGING}"
            echo "apiBaseUrlRelease=${API_BASE_URL_RELEASE}"
          } >> local.properties

      - name: Run Android checks
        working-directory: android
        run: ./gradlew :app:detekt :app:ktlintCheck :app:lintDebug :app:testDebugUnitTest

      - name: Assemble staging debug
        working-directory: android
        run: ./gradlew :app:assembleStagingDebug

      - name: Assemble release (smoke check with debug signing)
        working-directory: android
        run: ./gradlew :app:assembleRelease

