name: daynest-lib-ci

on:
  pull_request:
    paths:
      - 'python-daynest/**'
      - '.github/workflows/daynest-lib-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'python-daynest/**'
      - '.github/workflows/daynest-lib-ci.yml'

concurrency:
  group: "daynest-lib-ci-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lib-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-daynest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: '0.8.22'

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Type-check
        run: uv run pyright src

      - name: Test
        run: uv run pytest -q
