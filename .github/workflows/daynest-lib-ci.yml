name: daynest-lib-ci

on:
  pull_request:
    paths:
      - 'python-daynest/**'
      - '.github/workflows/daynest-lib-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'python-daynest/**'
      - '.github/workflows/daynest-lib-ci.yml'

concurrency:
  group: "daynest-lib-ci-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lib-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-daynest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: '0.8.22'

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Type-check
        run: uv run pyright src

      - name: Test
        run: uv run pytest -q
