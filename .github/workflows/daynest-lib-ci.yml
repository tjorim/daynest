name: daynest-lib-ci

on:
  pull_request:
    paths:
      - 'python-daynest/**'
      - '.github/workflows/daynest-lib-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'python-daynest/**'
      - '.github/workflows/daynest-lib-ci.yml'

concurrency:
  group: "daynest-lib-ci-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lib-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-daynest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.8.22'

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Type-check
        run: uv run pyright src

      - name: Test
        run: uv run pytest -q
