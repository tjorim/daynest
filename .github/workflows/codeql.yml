name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Write placeholder local.properties
        working-directory: android
        run: |
          {
            echo "apiBaseUrlStaging=https://staging.placeholder.invalid/"
            echo "apiBaseUrlRelease=https://release.placeholder.invalid/"
            echo "oidcIssuerUrlStaging=https://staging.placeholder.invalid/realms/daynest"
            echo "oidcIssuerUrlRelease=https://release.placeholder.invalid/realms/daynest"
          } >> local.properties

      - name: Build for analysis
        working-directory: android
        run: ./gradlew :app:compileDebugKotlin

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          category: /language:java-kotlin
