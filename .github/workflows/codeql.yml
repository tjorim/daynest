name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Set up JDK 17
        if: matrix.build-mode == 'manual'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Write placeholder local.properties
        if: matrix.build-mode == 'manual'
        working-directory: android
        run: |
          {
            echo "apiBaseUrlStaging=https://staging.placeholder.invalid/"
            echo "apiBaseUrlRelease=https://release.placeholder.invalid/"
            echo "oidcIssuerUrlStaging=https://staging.placeholder.invalid/realms/daynest"
            echo "oidcIssuerUrlRelease=https://release.placeholder.invalid/realms/daynest"
          } >> local.properties

      - name: Build for analysis
        if: matrix.build-mode == 'manual'
        working-directory: android
        run: ./gradlew :app:compileDebugKotlin

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: /language:${{ matrix.language }}
