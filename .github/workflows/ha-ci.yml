name: ha-ci

on:
  pull_request:
    paths:
      - 'custom_components/**'
      - 'tests/**'
      - 'daynest-home-assistant/**'
      - '.github/workflows/ha-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'custom_components/**'
      - 'tests/**'
      - 'daynest-home-assistant/**'
      - '.github/workflows/ha-ci.yml'

concurrency:
  group: "ha-ci-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  ha-safety:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daynest-home-assistant
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: daynest-home-assistant/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.8.22'

      - name: Bootstrap environment
        run: ./script/setup/bootstrap

      - name: Install Node.js dependencies
        run: npm ci --silent

      - name: Lint
        run: ./script/python-check

      - name: Type-check
        run: ./script/type-check

      - name: Run tests
        run: ./script/test
