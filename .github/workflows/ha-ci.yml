name: ha-ci

on:
  pull_request:
    paths:
      - 'custom_components/**'
      - '.github/workflows/ha-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'custom_components/**'
      - '.github/workflows/ha-ci.yml'

concurrency:
  group: "ha-ci-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ha-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14.2'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.8.22'

      - name: Install dependencies
        working-directory: custom_components
        run: |
          uv sync --group test
          echo "VIRTUAL_ENV=${{ github.workspace }}/custom_components/.venv" >> "$GITHUB_ENV"
          echo "${{ github.workspace }}/custom_components/.venv/bin" >> "$GITHUB_PATH"

      - name: Lint
        working-directory: custom_components
        run: ruff check daynest/ tests/

      - name: Run tests
        working-directory: custom_components
        run: pytest -q
