name: HACS Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'custom_components/**'
      - 'dashboard/**'
      - 'hacs.json'
      - '.github/workflows/hacs-release.yml'

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard card
        working-directory: dashboard
        run: npm run build

      - name: Stage HACS package
        run: |
          mkdir -p release/custom_components
          cp -R custom_components/daynest release/custom_components/daynest

      - name: Create HACS release archive
        working-directory: release
        run: zip -r ../daynest.zip .

      - name: Upload HACS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: daynest
          path: daynest.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download HACS package artifact
        uses: actions/download-artifact@v4
        with:
          name: daynest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: daynest.zip
