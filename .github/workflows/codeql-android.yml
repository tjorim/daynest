name: CodeQL Android

on:
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/codeql-android.yml"
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/codeql-android.yml"
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check CodeQL Kotlin support
        id: codeql-kotlin
        run: |
          set -euo pipefail
          kotlin_version="$(awk -F '"' '/^kotlin = / { print $2 }' android/gradle/libs.versions.toml)"
          max_supported="2.3.29"
          if printf '%s\n%s\n' "${kotlin_version}" "${max_supported}" | sort -V -C; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping CodeQL java-kotlin analysis: Kotlin ${kotlin_version} is newer than CodeQL's current Kotlin support."
          fi

      - name: Initialize CodeQL
        if: steps.codeql-kotlin.outputs.supported == 'true'
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Set up JDK 17
        if: steps.codeql-kotlin.outputs.supported == 'true'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Gradle
        if: steps.codeql-kotlin.outputs.supported == 'true'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build for analysis
        if: steps.codeql-kotlin.outputs.supported == 'true'
        working-directory: android
        run: ./gradlew :app:compileDebugKotlin

      - name: Perform CodeQL analysis
        if: steps.codeql-kotlin.outputs.supported == 'true'
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:java-kotlin
