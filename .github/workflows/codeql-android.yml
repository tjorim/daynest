name: CodeQL Android

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/codeql-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/codeql-android.yml'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check CodeQL Kotlin support
        id: codeql-kotlin
        run: |
          set -euo pipefail
          kotlin_version="$(awk -F '"' '/^kotlin = / { print $2 }' android/gradle/libs.versions.toml)"
          max_supported="2.3.29"
          if printf '%s\n%s\n' "${kotlin_version}" "${max_supported}" | sort -V -C; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping CodeQL java-kotlin analysis: Kotlin ${kotlin_version} is newer than CodeQL's current Kotlin support."
          fi

      - name: Initialize CodeQL
        if: steps.codeql-kotlin.outputs.supported == 'true'
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Set up JDK 17
        if: steps.codeql-kotlin.outputs.supported == 'true'
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        if: steps.codeql-kotlin.outputs.supported == 'true'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Write placeholder local.properties
        if: steps.codeql-kotlin.outputs.supported == 'true'
        working-directory: android
        run: |
          {
            echo "apiBaseUrlRelease=https://release.placeholder.invalid/"
          } >> local.properties

      - name: Build for analysis
        if: steps.codeql-kotlin.outputs.supported == 'true'
        working-directory: android
        run: ./gradlew :app:compileDebugKotlin

      - name: Perform CodeQL Analysis
        if: steps.codeql-kotlin.outputs.supported == 'true'
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:java-kotlin
