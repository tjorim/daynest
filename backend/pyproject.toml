[project]
name = "daynest-backend"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "alembic==1.18.4",
    "email-validator==2.3.0",
    "fastapi==0.136.1",
    "mcp==1.27.0",
    "psycopg[binary]==3.3.3",
    "pydantic==2.13.3",
    "pydantic-settings==2.14.0",
    "pyjwt==2.12.1",
    "sentry-sdk[fastapi]==2.58.0",
    "sqlalchemy==2.0.49",
    "uvicorn[standard]==0.46.0",
]

[dependency-groups]
dev = [
    "httpx==0.28.1",
    "pytest==9.0.3",
    "ruff==0.15.12",
    "ty>=0.0.33",
]

[tool.ruff.lint]
ignore = ["B008"]  # Depends/Query in FastAPI route defaults is intentional
per-file-ignores = { "__init__.py" = ["F401"] }
