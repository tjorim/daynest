[project]
name = "daynest-backend"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "alembic==1.18.4",
    "anyio==4.13.0",
    "email-validator==2.3.0",
    "fastapi==0.136.1",
    "google-auth==2.47.0",
    "httpx==0.28.1",
    "fastmcp>=3.0,<4",
    "psycopg[binary]==3.3.4",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.1",
    "cryptography>=48.0.0",
    "pyjwt==2.12.1",
    "python-dateutil>=2.9.0",
    "pywebpush==2.3.0",
    "sentry-sdk[fastapi]==2.60.0",
    "sse-starlette==3.4.4",
    "sqlalchemy==2.0.49",
    "uvicorn[standard]==0.47.0",
]

[dependency-groups]
dev = [
    "pytest==9.0.3",
    "ruff==0.15.13",
    "ty>=0.0.38",
]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.ruff.lint]
ignore = ["B008"]  # Depends/Query in FastAPI route defaults is intentional
per-file-ignores = { "__init__.py" = ["F401"] }
