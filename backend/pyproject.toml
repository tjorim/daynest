[project]
name = "daynest-backend"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "alembic==1.13.3",
    "email-validator>=2.2",
    "fastapi>=0.136.1",
    "psycopg[binary]==3.2.3",
    "pydantic==2.13.3",
    "pydantic-settings==2.7.0",
    "pyjwt>=2.12.0",
    "sentry-sdk[fastapi]==2.18.0",
    "sqlalchemy==2.0.36",
    "uvicorn[standard]>=0.46.0",
]

[dependency-groups]
dev = [
    "httpx==0.27.2",
    "mypy==1.20.2",
    "pytest==9.0.3",
    "ruff==0.15.12",
]

[tool.mypy]
explicit_package_bases = true
python_version = "3.12"
ignore_missing_imports = true
disable_error_code = ["prop-decorator"]  # property decorator stacking (e.g. @classmethod + @property) requires this

[tool.ruff.lint]
ignore = ["B008"]  # Depends/Query in FastAPI route defaults is intentional
per-file-ignores = { "__init__.py" = ["F401"] }
