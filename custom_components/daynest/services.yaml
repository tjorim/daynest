refresh:
  # No fields required. Triggers an immediate data refresh on all loaded Daynest entries.

complete_task:
  fields:
    task_id:
      required: true
      selector:
        number:
          min: 1
          mode: box

snooze_task:
  fields:
    task_id:
      required: true
      selector:
        number:
          min: 1
          mode: box
    days:
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 30
          mode: box

mark_medication_taken:
  fields:
    medication_dose_id:
      required: true
      selector:
        number:
          min: 1
          mode: box
