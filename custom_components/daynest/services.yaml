refresh:
  # No fields required. Triggers an immediate data refresh on all loaded Daynest entries.

complete_task:
  fields:
    chore_instance_id:
      required: true
      selector:
        number:
          min: 1
          mode: box

snooze_task:
  fields:
    chore_instance_id:
      required: true
      selector:
        number:
          min: 1
          mode: box
    days:
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 30
          mode: box

mark_medication_taken:
  fields:
    medication_dose_id:
      required: true
      selector:
        number:
          min: 1
          mode: box

skip_task:
  fields:
    chore_instance_id:
      required: true
      selector:
        number:
          min: 1
          mode: box

skip_medication:
  fields:
    medication_dose_id:
      required: true
      selector:
        number:
          min: 1
          mode: box

create_planned_item:
  fields:
    title:
      required: true
      selector:
        text: {}
    planned_for:
      required: false
      selector:
        date: {}
    notes:
      required: false
      selector:
        text:
          multiline: true

update_planned_item:
  fields:
    planned_item_id:
      required: true
      selector:
        number:
          min: 1
          mode: box
    title:
      required: false
      selector:
        text: {}
    planned_for:
      required: false
      selector:
        date: {}
    time_of_day:
      required: false
      selector:
        time: {}
    duration_minutes:
      required: false
      selector:
        number:
          min: 1
          mode: box
    notes:
      required: false
      selector:
        text:
          multiline: true
    priority:
      required: false
      selector:
        text: {}
    is_done:
      required: false
      selector:
        boolean: {}
    rrule:
      required: false
      selector:
        text: {}
    scope:
      required: false
      default: this
      selector:
        select:
          mode: dropdown
          options:
            - this
            - future
            - all
